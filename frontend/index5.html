<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Regex to DFA</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: auto;
            background: #f4f4f4;
            padding: 30px;
        }

        label {
            font-weight: bold;
            margin-top: 20px;
            display: block;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input[type="submit"] {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }

        .result, .error {
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
        }

        .result {
            background: #e0f7e9;
            border-left: 5px solid #2ecc71;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border-left: 5px solid #c0392b;
        }

        img {
            max-width: 100%;
            margin-top: 20px;
            border: 1px solid #ccc;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div><strong>Logged in as:</strong> {{ username }}</div>
    <div><a href="{{ url_for('logout') }}">Logout</a></div>
</div>

<h1>Regex to DFA Converter</h1>

<form method="POST">
    <label for="regex">Regular Expression (e.g., abc):</label>
    <input type="text" name="regex" required value="{{ regex }}">

    <label for="test_string">Test String:</label>
    <input type="text" name="test_string" required value="{{ test_string }}">

    <label for="language_desc">Language Description:</label>
    <textarea name="language_desc">{{ language_desc }}</textarea>

    <input type="submit" value="Convert & Test">
</form>

{% if result is not none %}
<div class="result">
    <strong>Result:</strong> Test string "<strong>{{ test_string }}</strong>" accepted? 
    <strong>{{ result }}</strong><br>
    <strong>Language:</strong> {{ language_desc }}
</div>
{% endif %}

{% if error %}
<div class="error"><strong>Error:</strong> {{ error }}</div>
{% endif %}

{% if image_path %}
<img src="{{ url_for('static', filename=image_path) }}?t={{ timestamp }}" alt="DFA Diagram">
{% endif %}

</body>
</html>
