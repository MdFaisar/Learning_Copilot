<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NFA Epsilon Tester</title>
    <style>
        /* Styling from second HTML for consistency */
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0 auto;
            max-width: 800px;
            padding: 30px;
            background-color: #f9f9f9;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #34495e;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
            background-color: #fff;
        }

        textarea {
            height: 130px;
        }

        input[type="submit"] {
            display: inline-block;
            background-color: #27ae60;
            color: white;
            padding: 12px 20px;
            margin-top: 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #1e8449;
        }

        .result {
            margin-top: 25px;
            padding: 15px;
            background-color: #ecf0f1;
            border-left: 5px solid #27ae60;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border-left-color: #c0392b;
        }

        img {
            max-width: 100%;
            margin-top: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .top-bar a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }

        .top-bar a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div><strong>Logged in as:</strong> {{ username }}</div>
        <div><a href="{{ url_for('logout') }}">Logout</a></div>
    </div>

    <h1>NFA with Epsilon Transitions</h1>

    <form method="POST">
        <label>Alphabet (space-separated):</label>
        <input type="text" name="alphabet" placeholder="e.g., a b" required>

        <label>States (space-separated):</label>
        <input type="text" name="states" placeholder="e.g., q0 q1 q2" required>

        <label>Initial State:</label>
        <input type="text" name="initial_state" placeholder="e.g., q0" required>

        <label>Accepting States:</label>
        <input type="text" name="accepting_states" placeholder="e.g., q2" required>

        <label>Transitions (format: state symbol next_state(s)):</label>
        <textarea name="transitions" placeholder="q0 a q1&#10;q0 ε q2&#10;q1 b q2"></textarea>

        <label>Test Word:</label>
        <input type="text" name="test_word" placeholder="e.g., ab (leave blank for ε)">

        <input type="submit" value="Test NFA with ε">
    </form>

    {% if result is not none %}
    <div class="result">
        <strong>Result:</strong> Word '<strong>{{ word or 'ε' }}</strong>' accepted? <strong>{{ result }}</strong>
    </div>
    {% endif %}

    {% if image_path %}
    <div class="result">
        <h3>NFA Diagram with Epsilon Closure Highlighted</h3>
        <img src="{{ url_for('static', filename=image_path) }}?t={{ timestamp }}" alt="NFA Graph">
    </div>
    {% endif %}

    {% if error %}
    <div class="result error">
        <strong>Error:</strong> {{ error }}
    </div>
    {% endif %}
</body>
</html>
