<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Linked List Visualizer</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0 auto;
            max-width: 800px;
            padding: 30px;
            background-color: #f9f9f9;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #34495e;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
            background-color: #fff;
        }

        input[type="submit"] {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 12px 20px;
            margin-top: 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #2980b9;
        }

        .result {
            margin-top: 25px;
            padding: 15px;
            background-color: #ecf0f1;
            border-left: 5px solid #3498db;
        }

        video {
            margin-top: 20px;
            width: 100%;
            border-radius: 10px;
        }

        audio {
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>Linked List Visualizer</h1>

    <form method="POST">
        <label>Enter data values for linked list (separated by spaces):</label>
        <input type="text" name="data_values" placeholder="e.g. 10 20 30 40" required>

        <input type="submit" value="Generate Animation">
    </form>

    {% if video_path %}
    <div class="result">
        <h3>Linked List Animation:</h3>
        <video controls>
            <source src="{{ url_for('static', filename=video_path) }}" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    {% endif %}

    {% if audio_path %}
    <div class="result">
        <h3>Narration:</h3>
        <audio controls>
            <source src="{{ url_for('static', filename=audio_path) }}" type="audio/mpeg">
            Your browser does not support the audio tag.
        </audio>
    </div>
    {% endif %}
</body>
</html>
